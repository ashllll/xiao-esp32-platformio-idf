site_name: XIAO ESP32 开发文档
site_description: PlatformIO + ESP-IDF 项目、固件、引脚及外围设备文档
site_url: https://ashllll.github.io/xiao-esp32-platformio-idf/
repo_url: https://github.com/ashllll/xiao-esp32-platformio-idf
repo_name: ashllll/xiao-esp32-platformio-idf
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: XIAO ESP32 Development Guide
          site_description: PlatformIO + ESP-IDF project, firmware, pinout, and peripheral documentation
          nav_translations:
            首页: Home
            快速开始: Getting started
            开发流程: Development workflow
            硬件: Hardware
            XIAO 型号: XIAO boards
            引脚定义: Pinout
            供电、USB 与电气安全: Power, USB, and electrical safety
            真机验证矩阵: Hardware validation matrix
            固件: Firmware
            工程结构: Architecture
            配置与依赖: Configuration and dependencies
            编译与烧录: Build and flash
            固件发布: Firmware releases
            外围设备: Peripherals
            集成总览: Integration overview
            ENS160 空气质量传感器: ENS160 air-quality sensor
            SGP41 VOC/NOx 传感器: SGP41 VOC/NOx sensor
            SHT40 温湿度传感器: SHT40 temperature/humidity sensor
            0.96 寸 I²C OLED: 0.96-inch I²C OLED
            OPT101 光照传感器: OPT101 light sensor
            ADS1115 实战: ADS1115 guide
            GPIO、ADC 与 PWM: GPIO, ADC, and PWM
            无线连接: Wireless
            调试: Debugging
            参考资料: References
            资料索引: Resource index
            文档维护: Documentation maintenance
            ENS160 一手资料核对: ENS160 primary-source review
            SGP41 一手资料核对: SGP41 primary-source review
            SHT40 一手资料核对: SHT40 primary-source review
            OLED 一手资料核对: OLED primary-source review
            OPT101 一手资料核对: OPT101 primary-source review
            ADS1115 与 NTC100K 一手资料核对: ADS1115 and NTC100K primary-source review
            XIAO/工具链文档审查: XIAO/toolchain documentation audit

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 开发流程: workflow.md
  - 硬件:
      - XIAO 型号: hardware/boards.md
      - 引脚定义: hardware/pinout.md
      - 供电、USB 与电气安全: hardware/power-usb.md
      - 真机验证矩阵: hardware/validation.md
  - 固件:
      - 工程结构: firmware/architecture.md
      - 配置与依赖: firmware/configuration.md
      - 编译与烧录: firmware/build-flash.md
      - 固件发布: firmware/release.md
  - 外围设备:
      - 集成总览: peripherals/index.md
      - I²C: peripherals/i2c.md
      - ENS160 空气质量传感器: peripherals/ens160.md
      - SGP41 VOC/NOx 传感器: peripherals/sgp41.md
      - SHT40 温湿度传感器: peripherals/sht40.md
      - 0.96 寸 I²C OLED: peripherals/oled-096-i2c.md
      - OPT101 光照传感器: peripherals/opt101.md
      - ADS1115 实战: peripherals/ads1115.md
      - SPI: peripherals/spi.md
      - UART: peripherals/uart.md
      - GPIO、ADC 与 PWM: peripherals/gpio-adc-pwm.md
  - 无线连接: wireless/index.md
  - 调试: debugging/index.md
  - 参考资料:
      - 资料索引: reference/resources.md
      - 文档维护: reference/maintenance.md
      - ENS160 一手资料核对: research/ens160-primary-sources.md
      - SGP41 一手资料核对: research/sgp41-primary-sources.md
      - SHT40 一手资料核对: research/sht40-primary-sources.md
      - OLED 一手资料核对: research/oled-128x64-primary-sources.md
      - OPT101 一手资料核对: research/opt101-primary-sources.md
      - ADS1115 与 NTC100K 一手资料核对: research/ads1115-ntc100k-primary-sources-2026-07-22.md
      - XIAO/工具链文档审查: research/xiao-platform-docs-audit-2026-07-22.md

exclude_docs: |
  peripherals/_template.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
