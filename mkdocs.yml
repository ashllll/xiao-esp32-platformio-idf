site_name: XIAO ESP32 开发文档
site_description: PlatformIO + ESP-IDF 项目、固件、引脚及外围设备文档
site_url: https://ashllll.github.io/xiao-esp32-platformio-idf/
repo_url: https://github.com/ashllll/xiao-esp32-platformio-idf
repo_name: ashllll/xiao-esp32-platformio-idf
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

nav:
  - 首页: index.md
  - 快速开始: getting-started.md
  - 开发流程: workflow.md
  - 硬件:
      - XIAO 型号: hardware/boards.md
      - 引脚定义: hardware/pinout.md
      - 供电、USB 与电气安全: hardware/power-usb.md
      - 真机验证矩阵: hardware/validation.md
  - 固件:
      - 工程结构: firmware/architecture.md
      - 配置与依赖: firmware/configuration.md
      - 编译与烧录: firmware/build-flash.md
      - 固件发布: firmware/release.md
  - 外围设备:
      - 集成总览: peripherals/index.md
      - I²C: peripherals/i2c.md
      - ENS160 空气质量传感器: peripherals/ens160.md
      - SGP41 VOC/NOx 传感器: peripherals/sgp41.md
      - SHT40 温湿度传感器: peripherals/sht40.md
      - 0.96 寸 I²C OLED: peripherals/oled-096-i2c.md
      - OPT101 光照传感器: peripherals/opt101.md
      - ADS1115 实战: peripherals/ads1115.md
      - SPI: peripherals/spi.md
      - UART: peripherals/uart.md
      - GPIO、ADC 与 PWM: peripherals/gpio-adc-pwm.md
  - 无线连接: wireless/index.md
  - 调试: debugging/index.md
  - 参考资料:
      - 资料索引: reference/resources.md
      - 文档维护: reference/maintenance.md
      - ENS160 一手资料核对: research/ens160-primary-sources.md
      - SGP41 一手资料核对: research/sgp41-primary-sources.md
      - SHT40 一手资料核对: research/sht40-primary-sources.md
      - OLED 一手资料核对: research/oled-128x64-primary-sources.md
      - OPT101 一手资料核对: research/opt101-primary-sources.md

exclude_docs: |
  peripherals/_template.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
