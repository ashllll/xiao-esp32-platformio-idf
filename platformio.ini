[platformio]
default_envs = xiao_esp32c3
src_dir = src

[env]
platform = espressif32@7.0.0
framework = espidf
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time
build_flags =
    -I include

[env:xiao_esp32c3]
board = seeed_xiao_esp32c3
board_build.esp-idf.sdkconfig_path = .pio/sdkconfig-xiao_esp32c3
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.flash-4mb"
build_flags =
    ${env.build_flags}
    -D XIAO_ESP32C3=1

[env:xiao_esp32s3]
board = seeed_xiao_esp32s3
board_build.esp-idf.sdkconfig_path = .pio/sdkconfig-xiao_esp32s3
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.xiao-esp32s3"
build_flags =
    ${env.build_flags}
    -D XIAO_ESP32S3=1

[env:xiao_esp32c6]
board = seeed_xiao_esp32c6
board_build.esp-idf.sdkconfig_path = .pio/sdkconfig-xiao_esp32c6
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.flash-4mb"
build_flags =
    ${env.build_flags}
    -D XIAO_ESP32C6=1
